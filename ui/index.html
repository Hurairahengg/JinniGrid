<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JINNI Grid — Mother Server Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body data-theme="dark">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">JG</div>
      <div class="brand-text">
        <span class="brand-name">JINNI Grid</span>
        <span class="brand-sub">Mother Server</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard"><i class="fa-solid fa-grip"></i><span>Dashboard</span></a>
      <a href="#" class="nav-item" data-page="fleet"><i class="fa-solid fa-server"></i><span>Fleet</span></a>
      <a href="#" class="nav-item" data-page="portfolio"><i class="fa-solid fa-chart-line"></i><span>Portfolio</span></a>
      <a href="#" class="nav-item" data-page="strategies"><i class="fa-solid fa-crosshairs"></i><span>Strategies</span></a>
      <a href="#" class="nav-item" data-page="logs"><i class="fa-solid fa-scroll"></i><span>Logs</span></a>
      <a href="#" class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
        <i class="fa-solid fa-sun"></i><span>Light Mode</span>
      </button>
    </div>
  </aside>
  <div class="main-wrapper">
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
        <span class="topbar-subtitle">Mother Server Control Panel</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-status">
          <span class="status-dot status-dot--online pulse"></span>
          <span class="status-label">System Online</span>
        </div>
        <div class="topbar-clock" id="topbar-clock">00:00:00</div>
      </div>
    </header>
    <main class="content" id="main-content"></main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/mockData.js"></script>
  <script src="js/apiClient.js"></script>
  <script src="js/themeManager.js"></script>
  <script src="js/dashboardRenderer.js"></script>
  <script src="js/fleetRenderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
